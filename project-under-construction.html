<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROJECT | UNDER CONSTRUCTION</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/MainStyles.css" />
    <script src="scripts/MainScript.js"></script>
  </head>

  <body>
    <!-- Loading screen -->

    <div id="loadingScreen" class="loading-screen">
      <div class="loading-title">
        <h2>INITIALIZING</h2>
        <p>NEURAL NETWORK</p>
      </div>

      <div class="loading-spinner"></div>

      <div class="loading-status">
        <div class="status-item">
          <span class="status-label">SYSTEMS</span>
          <span class="status-bar"><span class="status-fill"></span></span>
        </div>
        <div class="status-item">
          <span class="status-label">CORE</span>
          <span class="status-bar"><span class="status-fill"></span></span>
        </div>
        <div class="status-item">
          <span class="status-label">INTERFACE</span>
          <span class="status-bar"><span class="status-fill"></span></span>
        </div>
      </div>

      <div class="mecha-code">
        <div class="code-line">
          <span class="code-symbol">></span>
          <span class="code-text">Portfolio Engine v2.0</span>
        </div>
        <div class="code-line">
          <span class="code-symbol">></span>
          <span class="code-text">Loading assets...</span>
        </div>
        <div class="code-line">
          <span class="code-symbol">></span>
          <span class="code-text">Sync complete</span>
        </div>
      </div>
    </div>

    <header class="hero">
      <div class="hero-lines">
        <div class="line horizontal"></div>
        <div class="line vertical"></div>
      </div>

      <div class="hero-corners">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
      </div>

      <div class="hero-content">
        <div class="hero-label">[ PROJECT STATUS ]</div>
        <h1 class="hero-title">Under Construction</h1>
        <p class="hero-subtitle">THIS PAGE IS STILL IN BUILD MODE</p>
        <p class="hero-description">
          The project details are not live yet. Check back soon.
        </p>
        <a class="cta-button" href="index.html#project-section">[ BACK_TO_PORTFOLIO ]</a>
      </div>
    </header>
  </body>
</html>
